services:
  # --- Application ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini
    networks:
      - sandbox-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sandbox-network
    restart: unless-stopped

  # --- Queue Worker ---
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: sh -c "php /var/www/html/artisan queue:work redis --queue=mqtt-messages --sleep=3 --tries=3 --memory=128 --timeout=60"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini
    networks:
      - sandbox-network
    restart: unless-stopped
    stop_grace_period: 35s
    deploy:
      replicas: ${QUEUE_WORKERS:-2}
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'queue:work' > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Laravel Reverb (WebSocket) ---
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: sh -c "php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini
    networks:
      - sandbox-network
    restart: unless-stopped

  # --- Scheduler ---
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: sh -c "php /var/www/html/artisan schedule:work"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini
    networks:
      - sandbox-network
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sandbox}
      POSTGRES_USER: ${DB_USERNAME:-sandbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sandbox}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sandbox-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes --databases 32
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sandbox-network
    restart: unless-stopped

  emqx:
    image: emqx/emqx:5.8
    environment:
      EMQX_NAME: csms-sandbox
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
    volumes:
      - emqx-data:/opt/emqx/data
      - ./docker/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_TLS_PORT:-8883}:8883"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status | grep started"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sandbox-network
    restart: unless-stopped

  # --- One-shot Init ---
  emqx-init:
    image: curlimages/curl:8.5.0
    volumes:
      - ./docker/emqx/init-webhook.sh:/scripts/init-webhook.sh:ro
    environment:
      EMQX_WEBHOOK_SECRET: ${EMQX_WEBHOOK_SECRET:-sandbox-webhook-secret}
      EMQX_DASHBOARD_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
    depends_on:
      emqx:
        condition: service_healthy
      nginx:
        condition: service_started
    entrypoint: sh /scripts/init-webhook.sh
    networks:
      - sandbox-network
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  emqx-data:

networks:
  sandbox-network:
    driver: bridge
