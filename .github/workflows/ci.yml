name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: sandbox_test
      DB_USERNAME: sandbox
      DB_PASSWORD: secret
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sandbox_test
          POSTGRES_USER: sandbox
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, pcntl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Generate JWT keys
        run: |
          mkdir -p storage/keys
          openssl ecparam -genkey -name prime256v1 -noout -out storage/keys/jwt-private.pem
          openssl ec -in storage/keys/jwt-private.pem -pubout -out storage/keys/jwt-public.pem

      - name: Run migrations
        run: php artisan migrate --force

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: php artisan test --parallel --processes=4
